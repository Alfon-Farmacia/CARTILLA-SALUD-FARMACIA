<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Farmacia — Cartilla de Salud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a4731 0%, #2d6a4f 100%);
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 40px 32px;
      width: 100%; max-width: 360px; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .login-card h1 { color: #1a4731; font-size: 1.4rem; margin-bottom: 6px; }
    .login-card p  { color: #666; font-size: .88rem; margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #d0e8da;
      border-radius: 10px; font-size: 1rem; margin-bottom: 14px;
      outline: none;
    }
    .login-card input:focus { border-color: #1a4731; }
    .login-card button {
      width: 100%; padding: 13px; background: #1a4731; color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: bold;
      cursor: pointer;
    }
    .login-card button:hover { background: #2d6a4f; }
    #login-error { color: #c0392b; font-size: .85rem; margin-top: 10px; }

    /* PANEL PRINCIPAL */
    #panel { display: none; }

    header {
      background: #1a4731; color: #fff;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; }
    header .subtitle { font-size: .78rem; opacity: .8; margin-top: 2px; }
    #btn-salir {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .85rem;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ESTADÍSTICAS */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 16px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .stat-num  { font-size: 2rem; font-weight: bold; color: #1a4731; }
    .stat-label{ font-size: .78rem; color: #666; margin-top: 4px; }

    /* TABLA PACIENTES */
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid #e8f0ec;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 { font-size: 1rem; color: #1a4731; }
    #buscador {
      padding: 7px 12px; border: 1.5px solid #d0e8da;
      border-radius: 8px; font-size: .85rem; width: 200px; outline: none;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f4faf7; padding: 10px 14px;
      font-size: .78rem; text-align: left; color: #555;
      border-bottom: 1px solid #e0ede6; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f0f4f2; transition: background .1s; }
    tbody tr:hover { background: #f9fdfb; }
    tbody td { padding: 11px 14px; font-size: .85rem; color: #333; }
    .btn-ver {
      background: #1a4731; color: #fff; border: none;
      padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: .8rem;
    }
    .btn-ver:hover { background: #2d6a4f; }
    #empty-pacientes { padding: 40px; text-align: center; color: #aaa; }

    /* MODAL DETALLE PACIENTE */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; align-items: flex-start; justify-content: center;
      z-index: 999; padding: 16px; overflow-y: auto;
    }
    #modal-overlay.visible { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%; max-width: 720px;
      margin: auto; box-shadow: 0 12px 50px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .modal-header {
      background: #1a4731; color: #fff;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 1.05rem; }
    #btn-cerrar-modal {
      background: none; border: none; color: #fff;
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .modal-body { padding: 20px; }
    .seccion-title {
      font-size: .82rem; font-weight: bold; color: #1a4731;
      text-transform: uppercase; letter-spacing: .05em;
      margin: 18px 0 8px; border-bottom: 2px solid #d4eddf; padding-bottom: 4px;
    }
    .seccion-title:first-child { margin-top: 0; }
    .det-table { width: 100%; border-collapse: collapse; margin-bottom: 4px; font-size: .82rem; }
    .det-table th {
      background: #f4faf7; padding: 7px 10px;
      text-align: left; color: #555; border-bottom: 1px solid #e0ede6;
    }
    .det-table td { padding: 7px 10px; border-bottom: 1px solid #f0f4f2; }
    .det-empty { color: #aaa; font-size: .82rem; padding: 8px 0; }
    .badge-ok   { background:#d4eddf; color:#1a5c35; padding:2px 8px; border-radius:10px; font-size:.75rem; }
    .badge-warn { background:#fff3cd; color:#856404; padding:2px 8px; border-radius:10px; font-size:.75rem; }
    .badge-high { background:#fde8e8; color:#c0392b; padding:2px 8px; border-radius:10px; font-size:.75rem; }

    .sync-info { font-size:.75rem; color:#aaa; margin-top:4px; }

    @media (max-width: 600px) {
      thead { display: none; }
      tbody td { display: block; padding: 5px 14px; }
      tbody td::before { content: attr(data-label) ': '; font-weight: bold; color:#555; }
    }
  </style>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <svg width="52" height="52" viewBox="0 0 100 100" style="margin:0 auto 16px;display:block">
      <defs><clipPath id="cc2"><rect x="34" y="8" width="32" height="84" rx="8"/><rect x="8" y="34" width="84" height="32" rx="8"/></clipPath></defs>
      <rect width="100" height="100" rx="16" fill="#1a4731"/>
      <rect x="0" y="0" width="100" height="50" fill="#4caf50" clip-path="url(#cc2)"/>
      <rect x="0" y="50" width="100" height="50" fill="#1a7a3c" clip-path="url(#cc2)"/>
    </svg>
    <h1>Panel de Farmacia</h1>
    <p>Cartilla de Salud · Acceso restringido</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="panel">
  <header>
    <div>
      <h1>Panel de Farmacia — Cartilla de Salud</h1>
      <div class="subtitle">Farmacia Alfonso Moraleda · Solo para uso interno</div>
    </div>
    <button id="btn-salir" onclick="salir()">Cerrar sesión</button>
  </header>

  <div class="container">
    <!-- Estadísticas -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Pacientes registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-tension">—</div>
        <div class="stat-label">Mediciones de tensión</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-peso">—</div>
        <div class="stat-label">Registros de peso</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-azucar">—</div>
        <div class="stat-label">Mediciones de azúcar</div>
      </div>
    </div>

    <!-- Tabla de pacientes -->
    <div class="card">
      <div class="card-header">
        <h2>Pacientes</h2>
        <input type="text" id="buscador" placeholder="Buscar paciente…" oninput="filtrar()">
      </div>
      <div id="tabla-pacientes-wrap">
        <div id="empty-pacientes">Cargando datos…</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DETALLE PACIENTE -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-nombre">—</h2>
      <button id="btn-cerrar-modal" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const ADMIN_PWD  = 'Farmacia24';
const JBIN_KEY   = '$2a$10$djcGrvoYJLwcV7J6ORG42OzTVdQ4KZhs9QfrL8FDqAnFXYHJOmHk6';
const JBIN_MASTER = '69e8e30136566621a8ddfd3a';
const JBIN_BASE  = 'https://api.jsonbin.io/v3/b';

let todosPacientes = [];

// ── LOGIN ──
function login() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PWD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    cargarPacientes();
  } else {
    document.getElementById('login-error').textContent = 'Contraseña incorrecta';
  }
}
function salir() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

// ── CARGAR DATOS ──
async function cargarPacientes() {
  const wrap = document.getElementById('tabla-pacientes-wrap');
  try {
    const res = await fetch(`${JBIN_BASE}/${JBIN_MASTER}/latest`, {
      headers: { 'X-Master-Key': JBIN_KEY }
    });
    const json = await res.json();
    const pacientes = (json.record || {}).pacientes || {};
    const lista = Object.entries(pacientes).map(([slug, datos]) => ({ id: slug, ...datos }));
    if (!lista.length) {
      wrap.innerHTML = '<div id="empty-pacientes">Aún no hay pacientes registrados.</div>';
      return;
    }
    todosPacientes = lista.sort((a,b) => (b.ultimaSync||'').localeCompare(a.ultimaSync||''));
    actualizarEstadisticas();
    renderTabla(todosPacientes);
  } catch(e) {
    wrap.innerHTML = '<div id="empty-pacientes">Error al cargar: ' + e.message + '</div>';
  }
}

function actualizarEstadisticas() {
  document.getElementById('stat-total').textContent   = todosPacientes.length;
  document.getElementById('stat-tension').textContent = todosPacientes.reduce((s,p)=>s+(p.tension||[]).length,0);
  document.getElementById('stat-peso').textContent    = todosPacientes.reduce((s,p)=>s+(p.peso||[]).length,0);
  document.getElementById('stat-azucar').textContent  = todosPacientes.reduce((s,p)=>s+(p.azucar||[]).length,0);
}

function renderTabla(pacientes) {
  const wrap = document.getElementById('tabla-pacientes-wrap');
  if (!pacientes.length) {
    wrap.innerHTML = '<div id="empty-pacientes">No se encontraron pacientes.</div>'; return;
  }
  const filas = pacientes.map(p => {
    const sync = p.ultimaSync ? new Date(p.ultimaSync).toLocaleString('es-ES') : '—';
    const tens  = (p.tension||[]).length;
    const pes   = (p.peso||[]).length;
    const az    = (p.azucar||[]).length;
    const col   = (p.colesterol||[]).length;
    return `<tr>
      <td data-label="Paciente"><strong>${esc(p.nombre||p.id)}</strong></td>
      <td data-label="Última sincronización" style="color:#888;font-size:.8rem">${sync}</td>
      <td data-label="Tensión"    style="text-align:center">${tens}</td>
      <td data-label="Peso"       style="text-align:center">${pes}</td>
      <td data-label="Azúcar"     style="text-align:center">${az}</td>
      <td data-label="Colesterol" style="text-align:center">${col}</td>
      <td><button class="btn-ver" onclick="verPaciente('${p.id}')">Ver historial</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Paciente</th><th>Última sync</th>
      <th style="text-align:center">Tensión</th>
      <th style="text-align:center">Peso</th>
      <th style="text-align:center">Azúcar</th>
      <th style="text-align:center">Colesterol</th>
      <th></th>
    </tr></thead>
    <tbody>${filas}</tbody>
  </table>`;
}

function filtrar() {
  const q = document.getElementById('buscador').value.toLowerCase();
  renderTabla(todosPacientes.filter(p => (p.nombre||p.id).toLowerCase().includes(q)));
}

// ── DETALLE PACIENTE ──
function verPaciente(id) {
  const p = todosPacientes.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-nombre').textContent = p.nombre || p.id;
  const sync = p.ultimaSync ? new Date(p.ultimaSync).toLocaleString('es-ES') : '—';
  let html = `<div class="sync-info">Última sincronización: ${sync}</div>`;

  html += seccionTabla('Tensión Arterial', p.tension||[],
    ['Fecha','Hora','Máxima','Mínima','Pulso'],
    e => [fmt(e.fecha), e.hora||'—',
      `<strong>${e.sist}</strong>`, `<strong>${e.diast}</strong>`, e.pulso||'—']);

  html += seccionTabla('Peso', p.peso||[],
    ['Fecha','Hora','Kg'],
    e => [fmt(e.fecha), e.hora||'—', `<strong>${e.kg} kg</strong>`]);

  html += seccionTabla('Azúcar en Sangre', p.azucar||[],
    ['Fecha','Hora','Glucosa','Momento'],
    e => [fmt(e.fecha), e.hora||'—', `<strong>${e.valor} mg/dL</strong>`, esc(e.momento||'')]);

  html += seccionTabla('Colesterol', p.colesterol||[],
    ['Fecha','Total','HDL','LDL','Triglicéridos'],
    e => [fmt(e.fecha), e.total||'—', e.hdl||'—', e.ldl||'—', e.trig||'—']);

  html += seccionTabla('Medicación', p.medicacion||[],
    ['Fármaco','Desayuno','Comida','Cena','Acostarse'],
    e => [esc(e.nombre), e.desayuno||'—', e.comida||'—', e.cena||'—', e.acostarse||'—']);

  if ((p.observaciones||[]).length) {
    html += '<div class="seccion-title">Observaciones</div>';
    html += p.observaciones.map(e =>
      `<div style="background:#f9fdfb;border-left:3px solid #1a4731;padding:8px 12px;margin-bottom:8px;border-radius:0 6px 6px 0;font-size:.83rem">
        <div style="font-size:.72rem;color:#888;margin-bottom:3px">${fmt(e.fecha)}</div>
        ${esc(e.texto)}
      </div>`).join('');
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('visible');
}

function seccionTabla(titulo, arr, cabeceras, fila) {
  let h = `<div class="seccion-title">${titulo}</div>`;
  if (!arr.length) return h + '<div class="det-empty">Sin registros</div>';
  const filas = [...arr].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''))
    .map(e => '<tr>' + fila(e).map(v=>`<td>${v}</td>`).join('') + '</tr>').join('');
  return h + `<table class="det-table">
    <thead><tr>${cabeceras.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${filas}</tbody>
  </table>`;
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

// Cerrar al pulsar fuera del modal
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

// ── UTILS ──
function fmt(fecha) {
  if (!fecha) return '—';
  const [y,m,d] = fecha.split('-');
  return d+'/'+m+'/'+y;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
